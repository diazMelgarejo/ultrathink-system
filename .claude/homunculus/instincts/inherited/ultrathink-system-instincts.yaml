# Ultrathink System Workflow Feature Development

## Action
Follow the feature-development workflow:
1. Load `single_agent/SKILL.md` for full ultrathink methodology context
2. Run AFRP gate (classify query type A/B/C/D, declare scope)
3. Add feature implementation
4. Add/update tests in `tests/`
5. Update `CHANGELOG.md` and relevant docs
6. Verify with `single_agent/scripts/verify_before_done.py`

## Evidence
- Workflow detected from commit patterns
- Frequency: ~12x per month
