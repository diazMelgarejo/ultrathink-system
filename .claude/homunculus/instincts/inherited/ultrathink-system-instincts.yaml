# Ultrathink System Commit Prefix

## Action

Use conventional commit prefixes with optional scope: `feat`, `fix`, `refactor`, `docs`, `sec`, `chore`, `arch`, `release`

## Evidence

- Dominant pattern: scoped conventional commits (feat(x):, fix(x):, sec(x):, docs(x):)
- Analyzed from 51 commits
- Examples: `feat(api): ...`, `sec(api_server): ...`, `fix(api_server): ...`, `arch: ...`

