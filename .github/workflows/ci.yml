name: CI
on:
  push:    { branches: [main, develop] }
  pull_request: { branches: [main] }

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          pip install pytest pydantic fastapi uvicorn --break-system-packages 2>/dev/null || pip install pytest pydantic fastapi uvicorn
      - name: Run tests
        run: pytest tests/ single_agent/cidf/tests/ -v --tb=short
      - name: Verify package
        run: bash verify-package.sh
      - name: Check api_server imports
        run: python -c "import ast; ast.parse(open('api_server.py').read()); print('api_server.py: syntax OK')"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling build
          pip install .
      
      - name: Build sdist and wheel
        run: |
          python -m build
      
      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  docs-sync:
    name: SKILL.md Version Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SKILL.md frontmatter version is not 1.x (no premature major bump)
        run: |
          VERSION=$(grep '^version:' single_agent/SKILL.md | head -1 | awk '{print $2}')
          echo "SKILL.md version: $VERSION"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$MAJOR" -ge 1 ]; then
            echo "FAIL: SKILL.md version '$VERSION' is >= 1.0 — major version bump requires explicit approval"
            exit 1
          fi
          echo "OK: version $VERSION is pre-1.0"

      - name: Verify Quick Start section exists
        run: |
          if ! grep -q "Quick Start" single_agent/SKILL.md; then
            echo "FAIL: Quick Start section missing from single_agent/SKILL.md"
            exit 1
          fi
          echo "OK: Quick Start section present"

      - name: Verify mcp-ultrathink-lmstudio in allowed-tools
        run: |
          if ! grep -q "mcp-ultrathink-lmstudio" single_agent/SKILL.md; then
            echo "FAIL: mcp-ultrathink-lmstudio missing from allowed-tools in SKILL.md"
            exit 1
          fi
          echo "OK: mcp-ultrathink-lmstudio present in allowed-tools"
