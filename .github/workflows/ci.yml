name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest hatchling build tomli
      
      - name: Run pytest
        run: |
          pytest -q tests/
      
      - name: Run package install test
        run: |
          python test-package-install.py
      
      - name: Build package
        run: |
          python -m build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint
      
      - name: Lint with flake8 (warnings only)
        run: |
          # stop the build on syntax errors or undefined names, but ignore style warnings
          flake8 multi_agent single_agent tests --count --select=E9,F63,F7,F82 --show-source --statistics || true
      
      - name: Check imports
        run: |
          python -c "from multi_agent.shared.ultrathink_core import Stage, TaskState; print('✓ ultrathink_core imports OK')"
          python -c "from single_agent.cidf.core.content_insertion_framework import decide; print('✓ CIDF imports OK')" || true

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling build
      
      - name: Build sdist and wheel
        run: |
          python -m build
      
      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
