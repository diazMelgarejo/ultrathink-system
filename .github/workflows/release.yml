name: Release
on:
  push:
    tags: ["v*"]

# Deny all permissions by default; grant only what each job needs.
# This prevents "Resource not accessible by integration" surprises and
# limits blast radius if a step is compromised.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required: create GitHub release + upload assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[test]" && pytest tests/ -v
      - run: bash verify-package.sh
      - name: Create ZIP
        run: |
          cd ..
          zip -r orama-system-${{ github.ref_name }}.zip orama-system/ \
            --exclude "*/\.*" --exclude "*/__pycache__/*"
          mv orama-system-${{ github.ref_name }}.zip orama-system/
      - uses: softprops/action-gh-release@v2
        with:
          files: orama-system-${{ github.ref_name }}.zip
          generate_release_notes: true
