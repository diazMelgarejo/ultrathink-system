[project]
name = "ultrathink-system"
version = "0.9.4.1"
description = "ultrathink Multi-Agent System"
dependencies = [
    "redis>=5.0.0",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = ["multi_agent", "single_agent"]
only-include = [
    "multi_agent/",
    "single_agent/",
    "examples/",
    "docs/",
    "tests/",
    "LICENSE",
    "README.md",
    "CONTRIBUTING.md",
    "CHANGELOG.md",
    "install-single-agent.sh",
    "install-multi-agent.sh",
    "verify-package.sh",
]
