[project]
name = "ultrathink-system"
version = "2.0.0"
description = "ultrathink Multi-Agent System"
dependencies = [
    "redis>=5.0.0",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = ["multi-agent", "single-agent"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
