[project]
name = "ultrathink-system"
version = "0.9.4.1"
description = "ultrathink Multi-Agent System"
dependencies = [
    "redis>=5.0.0",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = ["multi_agent", "single_agent"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
